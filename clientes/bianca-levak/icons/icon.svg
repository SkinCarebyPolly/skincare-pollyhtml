<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e09"/>
      <stop offset="100%" style="stop-color:#2c1608"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8cfa0"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.2"/>
  <!-- S letter elegant -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="200" font-weight="400" font-style="italic" text-anchor="middle" fill="url(#gold)">S</text>
  <!-- Bottom text -->
  <text x="256" y="410" font-family="Georgia, serif" font-size="28" font-weight="400" letter-spacing="8" text-anchor="middle" fill="url(#gold)" opacity="0.7">SKINCARE</text>
</svg>
